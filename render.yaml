services:
  - type: web
    name: readar-backend
    rootDir: backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m alembic upgrade head && python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: FRONTEND_ORIGINS
        value: https://readar.ai,https://www.readar.ai,https://readar-chi.vercel.app
      # Secrets should be set in Render dashboard:
      # - DATABASE_URL (from Render Postgres)
      # - SUPABASE_URL
      # - SUPABASE_ANON_KEY
      # - SUPABASE_JWT_SECRET
      # - ANTHROPIC_API_KEY (for transition summary + book pitches)
      # - STRIPE_SECRET_KEY (if used)
      # - STRIPE_PUBLISHABLE_KEY (if used)
      # - STRIPE_WEBHOOK_SECRET (if used)
      # - STRIPE_PRICE_ID (if used)

