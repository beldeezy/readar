name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      # `build` runs `tsc -p tsconfig.json && vite build` — the real gate.
      - run: npm run build
      # Lint is informational for now (codebase predates CI linting).
      - run: npm run lint
        continue-on-error: true

  backend:
    name: Backend (compile + import smoke + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: test_readar
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      # Byte-compile everything (catches syntax errors across app/ + scripts/).
      - run: python -m compileall -q app
      # Import the app graph (catches bad imports / missing symbols). Engine is
      # created lazily with pool_pre_ping, so this does not hit the database.
      - run: python -c "import app.main"
        env:
          # Non-placeholder dummy (config rejects the default); engine is lazy so no connection is made.
          DATABASE_URL: postgresql://ci:ci@localhost:5432/readar_ci
      # Run the pytest suite against the Postgres service. conftest builds the
      # schema via create_all and isolates each test in a rolled-back transaction.
      - run: python -m pytest -q
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/test_readar
          TEST_DATABASE_URL: postgresql://ci:ci@localhost:5432/test_readar
